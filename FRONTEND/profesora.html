<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Asistencias - Profesora</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1545205597-3d9d02c29597?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; background-attachment: fixed; background-position: center; margin: 0; padding: 20px; 
        }
        .container { max-width: 500px; margin: 40px auto; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); padding: 30px; border-radius: 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: #1b5e20; margin-top: 0; font-size: 24px; }
        .alumno-card { background: white; margin: 12px 0; padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .alerta { border-left: 6px solid #e53935; background: #ffebee; }
        .btn-asist { background: #26a69a; color: white; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-asist:hover { background: #00897b; }
        .info-msg { text-align: center; color: #555; font-style: italic; padding: 20px; }
        .error-msg { text-align: center; color: #d32f2f; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧘‍♀️ Control de Asistencias • Yoga</h2>
        <div id="lista"><p class="info-msg">Cargando alumnos...</p></div>
    </div>

<script>
    const lista = document.getElementById('lista');

    function cargar() {
        fetch('http://127.0.0.1:8000/alumnos/')
        .then(r => r.json())
        .then(data => {
            lista.innerHTML = '';
            // Si data está vacío o no es un arreglo, avisamos
            if (!data || data.length === 0) {
                lista.innerHTML = '<p class="info-msg">🌸 No hay alumnos registrados.</p>';
                return;
            }
            
            // Dibujamos la lista usando los nombres exactos que nos dio tu servidor
            data.forEach(a => {
                const esAlerta = a.clases <= 0 ? 'alerta' : '';
                lista.innerHTML += `
                    <div class="alumno-card ${esAlerta}">
                        <span><b>${a.nombre}</b> (${a.clases} rest.)</span>
                        <button class="btn-asist" onclick="marcar(${a.id})">✔ Asistió</button>
                    </div>`;
            });
        })
        .catch(err => {
            lista.innerHTML = '<p class="error-msg">❌ Error de conexión con el servidor.</p>';
        });
    }

    function marcar(id){ 
        fetch(`http://127.0.0.1:8000/asistencia/${id}`, { method: 'POST' })
        .then(() => cargar()); 
    }

    setInterval(cargar, 4000);
    cargar();
</script>
</body>
</html>
